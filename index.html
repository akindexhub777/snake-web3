<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🐍 Snake Web3 · GenLayer Hackathon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; background: linear-gradient(135deg, #a78bfa, #7c3aed); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 4px; }
    .sub { font-size: 0.7rem; color: #4a4a6a; margin-bottom: 16px; }
    .wallet-card {
      background: #111128;
      border: 1px solid #2d2d4e;
      border-radius: 20px;
      padding: 12px 20px;
      width: 100%;
      max-width: 440px;
      text-align: center;
      margin-bottom: 20px;
    }
    #walletDisplay { font-size: 0.8rem; color: #a78bfa; word-break: break-all; margin-top: 6px; }
    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat {
      background: #111128;
      border: 1px solid #2d2d4e;
      border-radius: 18px;
      padding: 8px 16px;
      min-width: 90px;
      text-align: center;
    }
    .stat-label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
    .stat-value { font-size: 1.6rem; font-weight: bold; }
    .purple { color: #a78bfa; }
    .gold { color: #f59e0b; }
    .green { color: #10b981; }
    canvas {
      border-radius: 20px;
      box-shadow: 0 0 0 2px #2d2d4e, 0 10px 25px -5px black;
      display: block;
      background: #0d0d1a;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin: 16px 0 10px;
    }
    button {
      background: #111128;
      border: 1px solid #2d2d4e;
      color: #ddd;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.85rem;
    }
    button.primary { background: #7c3aed; border-color: #a78bfa; color: white; }
    button.primary:hover { background: #6d28d9; transform: scale(0.97); }
    button.gold { background: #92400e; border-color: #f59e0b; color: #fde68a; }
    button.gold:hover { background: #78350f; }
    .nft-badge {
      background: #064e3b;
      border: 1px solid #10b981;
      border-radius: 40px;
      padding: 8px 20px;
      display: none;
      margin: 8px 0;
      font-size: 0.8rem;
      font-weight: bold;
      color: #10b981;
    }
    .nft-badge.show { display: inline-block; }
    .leaderboard {
      background: #111128;
      border: 1px solid #2d2d4e;
      border-radius: 20px;
      padding: 16px;
      width: 100%;
      max-width: 440px;
      margin-top: 20px;
    }
    .leaderboard h3 { font-size: 0.9rem; color: #a78bfa; margin-bottom: 10px; }
    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px;
      border-radius: 30px;
      font-size: 0.8rem;
    }
    .lb-row:first-child { background: #2d1a4e; }
    .lb-addr { color: #aaa; flex: 1; margin: 0 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-weight: bold; color: #c084fc; }
    .msg-area { font-size: 0.75rem; color: #f59e0b; margin: 8px 0; text-align: center; min-height: 40px; }
    .dpad { display: none; margin-top: 15px; gap: 8px; flex-direction: column; align-items: center; }
    .dpad-row { display: flex; gap: 8px; }
    .dpad button { width: 55px; height: 55px; font-size: 1.5rem; }
    @media (max-width: 550px) { .dpad { display: flex; } .stats { gap: 6px; } .stat { padding: 4px 10px; } .stat-value { font-size: 1.2rem; } }
  </style>
</head>
<body>

<h1>🐍 SNAKE WEB3</h1>
<div class="sub">⚡ powered by GenLayer · on‑chain score & rewards</div>

<div class="wallet-card">
  <button id="connectWalletBtn" class="primary" style="width:100%">🔗 CONNECT WALLET (MetaMask / Rabby)</button>
  <div id="walletDisplay">⚡ Non connecté</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-label">SCORE</div><div class="stat-value purple" id="dispScore">0</div></div>
  <div class="stat"><div class="stat-label">HIGH SCORE</div><div class="stat-value purple" id="dispHigh">0</div></div>
  <div class="stat"><div class="stat-label">TOKENS 🪙</div><div class="stat-value gold" id="dispTokens">0</div></div>
  <div class="stat"><div class="stat-label">REWARD</div><div class="stat-value green" id="dispReward">0</div></div>
</div>

<div class="nft-badge" id="nftBadge">🏆 NFT REWARD — Score ≥ 10 débloqué !</div>

<div class="button-group">
  <button id="startBtn" class="primary">▶ START</button>
  <button id="pauseBtn">⏸ PAUSE</button>
  <button id="resetBtn">↺ RESET</button>
  <button id="claimBtn" class="gold">💰 CLAIM REWARD</button>
</div>

<div class="msg-area" id="msgArea">🔗 Connecte ton wallet pour jouer</div>

<canvas id="snakeCanvas" width="400" height="400"></canvas>

<!-- D‑pad mobile -->
<div class="dpad">
  <div class="dpad-row"><button data-dx="0" data-dy="-1">▲</button></div>
  <div class="dpad-row"><button data-dx="-1" data-dy="0">◀</button><button data-dx="0" data-dy="1">▼</button><button data-dx="1" data-dy="0">▶</button></div>
</div>

<div class="leaderboard">
  <h3>🏆 LEADERBOARD</h3>
  <div id="leaderboardList">⏳ Joue pour apparaître</div>
</div>

<script type="importmap">
  {
    "imports": {
      "genlayer-js": "https://cdn.skypack.dev/genlayer-js",
      "genlayer-js/chains": "https://cdn.skypack.dev/genlayer-js/chains",
      "viem": "https://cdn.skypack.dev/viem"
    }
  }
</script>

<script type="module">
  import { createClient, GenLayerClient } from 'genlayer-js';
  import { studionet } from 'genlayer-js/chains';

  // ---------- CONTRACT INFOS (à adapter si besoin) ----------
  const CONTRACT_ADDRESS = "0x8ca6C94dC761ca504fF4037a8412CC623a9Ebd76";
  const ABI = [
    { name: "eat_food", type: "write", inputs: [] },
    { name: "get_score", type: "view", inputs: [{ name: "player", type: "Address" }], outputs: [{ type: "u256" }] },
    { name: "claim_reward", type: "write", inputs: [] },
    { name: "get_reward", type: "view", inputs: [{ name: "player", type: "Address" }], outputs: [{ type: "u256" }] }
  ];

  // ---------- ÉTAT JEU ----------
  const canvas = document.getElementById('snakeCanvas');
  const ctx = canvas.getContext('2d');
  const GRID = 20, CELL = 400/GRID;
  let snake, dir, food, score, highScore, tokens, reward, nftUnlocked;
  let gameLoopId = null, running = false, paused = false;
  let walletAddress = null;
  let genLayerClient = null;

  // Leaderboard localStorage
  let leaderboard = JSON.parse(localStorage.getItem('snakeLB') || '[]');

  // DOM elements
  const dispScore = document.getElementById('dispScore');
  const dispHigh = document.getElementById('dispHigh');
  const dispTokens = document.getElementById('dispTokens');
  const dispReward = document.getElementById('dispReward');
  const msgDiv = document.getElementById('msgArea');
  const nftBadge = document.getElementById('nftBadge');
  const leaderboardDiv = document.getElementById('leaderboardList');

  // ---------- FONCTIONS METIER ----------
  function setMsg(msg, isError = false) {
    msgDiv.innerHTML = msg;
    if (isError) setTimeout(() => { if(msgDiv.innerHTML === msg) msgDiv.innerHTML = "🔁 " + (walletAddress ? "Prêt" : "Connecte ton wallet"); }, 3000);
  }

  function updateUI() {
    dispScore.innerText = score;
    dispHigh.innerText = highScore;
    dispTokens.innerText = tokens;
    dispReward.innerText = reward;
    if (nftUnlocked) nftBadge.classList.add('show');
    else nftBadge.classList.remove('show');
  }

  function spawnFood() {
    do {
      food = { x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID) };
    } while (snake.some(s => s.x === food.x && s.y === food.y));
  }

  function initGame() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    dir = {x:1, y:0};
    score = 0;
    tokens = parseInt(localStorage.getItem('snakeTokens') || '0');
    highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
    reward = parseInt(localStorage.getItem('snakeReward') || '0');
    nftUnlocked = localStorage.getItem('snakeNFT') === '1';
    spawnFood();
    updateUI();
    drawCanvas();
  }

  function drawCanvas() {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0,0,400,400);
    // grille
    ctx.strokeStyle = '#1a1a2e';
    ctx.lineWidth = 0.5;
    for(let i=0;i<=GRID;i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,400); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(400,i*CELL); ctx.stroke();
    }
    // nourriture
    ctx.fillStyle = '#f59e0b';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // serpent
    snake.forEach((seg, idx) => {
      const isHead = idx === 0;
      ctx.fillStyle = isHead ? '#a78bfa' : `rgba(139, 92, 246, ${0.3 + (1 - idx/snake.length)*0.5})`;
      const pad = isHead ? 2 : 3;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, 5);
      ctx.fill();
    });
    // affichage score
    ctx.fillStyle = '#a78bfa';
    ctx.font = 'bold 14px monospace';
    ctx.fillText(`SCORE ${score}`, 8, 25);
    ctx.fillStyle = '#f59e0b';
    ctx.fillText(`🪙 ${tokens}`, 8, 48);
  }

  // call blockchain eat_food
  async function sendEatToChain() {
    if (!genLayerClient || !walletAddress) return;
    try {
      await genLayerClient.writeContract({
        address: CONTRACT_ADDRESS,
        abi: ABI,
        functionName: "eat_food"
      });
      console.log("✅ eat_food on-chain");
    } catch(e) { console.warn("on-chain error (eat)", e); }
  }

  async function fetchOnChainScore() {
    if (!genLayerClient || !walletAddress) return 0;
    try {
      const res = await genLayerClient.readContract({
        address: CONTRACT_ADDRESS,
        abi: ABI,
        functionName: "get_score",
        args: [walletAddress]
      });
      return Number(res);
    } catch(e) { return 0; }
  }

  async function fetchOnChainReward() {
    if (!genLayerClient || !walletAddress) return 0;
    try {
      const res = await genLayerClient.readContract({
        address: CONTRACT_ADDRESS,
        abi: ABI,
        functionName: "get_reward",
        args: [walletAddress]
      });
      return Number(res);
    } catch(e) { return 0; }
  }

  async function claimRewardOnChain() {
    if (!genLayerClient || !walletAddress) { setMsg("❌ Wallet non connecté", true); return false; }
    if (score < 5) { setMsg("📉 Score trop bas (≥5) pour claim", true); return false; }
    try {
      setMsg("⏳ Claim en cours...");
      const tx = await genLayerClient.writeContract({
        address: CONTRACT_ADDRESS,
        abi: ABI,
        functionName: "claim_reward"
      });
      console.log("claim tx", tx);
      const newRew = await fetchOnChainReward();
      reward = newRew;
      localStorage.setItem('snakeReward', reward);
      updateUI();
      setMsg(`🎉 ${reward} GEN réclamés (testnet) !`);
      return true;
    } catch(e) {
      setMsg("❌ Échec claim : " + e.message, true);
      return false;
    }
  }

  // update leaderboard local (basé sur highScore)
  function updateLeaderboard() {
    if (!walletAddress) return;
    const shortAddr = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
    const existing = leaderboard.find(e => e.addr === shortAddr);
    if (existing) { if (highScore > existing.score) existing.score = highScore; }
    else leaderboard.push({ addr: shortAddr, score: highScore });
    leaderboard.sort((a,b) => b.score - a.score);
    leaderboard = leaderboard.slice(0,8);
    localStorage.setItem('snakeLB', JSON.stringify(leaderboard));
    renderLeaderboard();
  }

  function renderLeaderboard() {
    if (!leaderboard.length) { leaderboardDiv.innerHTML = "<div style='color:#666'>✨ Joue pour apparaître</div>"; return; }
    const medals = ['🥇','🥈','🥉','4️⃣','5️⃣','6️⃣','7️⃣','8️⃣'];
    leaderboardDiv.innerHTML = leaderboard.map((e,i) => `
      <div class="lb-row">
        <span>${medals[i]||'🏅'}</span>
        <span class="lb-addr">${e.addr}</span>
        <span class="lb-score">${e.score}</span>
      </div>
    `).join('');
  }

  // Game over
  async function gameOver() {
    if (gameLoopId) clearInterval(gameLoopId);
    running = false;
    const chainScore = await fetchOnChainScore();
    setMsg(`💀 GAME OVER ! Score : ${score}  |  on‑chain : ${chainScore}`);
    updateLeaderboard();
  }

  // Mouvement
  async function moveSnake() {
    if (!running || paused) return;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
    // murs
    if (head.x<0 || head.x>=GRID || head.y<0 || head.y>=GRID) { gameOver(); return; }
    // auto-mord
    if (snake.some(s => s.x===head.x && s.y===head.y)) { gameOver(); return; }

    snake.unshift(head);
    const ate = (head.x === food.x && head.y === food.y);
    if (ate) {
      score++;
      tokens++;
      localStorage.setItem('snakeTokens', tokens);
      await sendEatToChain();        // 🔥 on-chain update
      if (score > highScore) {
        highScore = score;
        localStorage.setItem('snakeHigh', highScore);
        updateLeaderboard();
      }
      if (score >= 10 && !nftUnlocked) {
        nftUnlocked = true;
        localStorage.setItem('snakeNFT', '1');
        nftBadge.classList.add('show');
        setMsg("🏆 NFT REWARD débloqué !");
      }
      // accélération progressive
      if (score % 5 === 0 && gameLoopId) {
        clearInterval(gameLoopId);
        const newSpeed = Math.max(70, 130 - Math.floor(score / 2));
        gameLoopId = setInterval(() => moveSnake(), newSpeed);
      }
      spawnFood();
      updateUI();
    } else {
      snake.pop();
    }
    drawCanvas();
  }

  // Contrôles
  function setDirection(dx, dy) {
    if (!running || paused) return;
    if ((dx===1 && dir.x===-1) || (dx===-1 && dir.x===1)) return;
    if ((dy===1 && dir.y===-1) || (dy===-1 && dir.y===1)) return;
    dir = { x: dx, y: dy };
  }

  // Start / Pause / Reset
  function startGame() {
    if (!walletAddress) { setMsg("🔗 Connecte ton wallet d'abord", true); return; }
    if (running) return;
    initGame();
    running = true;
    paused = false;
    if (gameLoopId) clearInterval(gameLoopId);
    gameLoopId = setInterval(() => moveSnake(), 130);
    setMsg("🎮 Jeu lancé ! Mange pour marquer des points on‑chain");
  }
  function pauseGame() { if(running) paused = !paused; setMsg(paused ? "⏸ Pause" : "▶ Reprise"); }
  function resetGame() {
    if (gameLoopId) clearInterval(gameLoopId);
    running = false;
    initGame();
    drawCanvas();
    setMsg("Jeu réinitialisé. Appuie sur START");
  }

  // ---------- WALLET + GENLAYER CLIENT ----------
  async function connectWalletAndClient() {
    if (!window.ethereum) {
      setMsg("❌ MetaMask ou Rabby non détecté. Installe le wallet.", true);
      return;
    }
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      walletAddress = accounts[0];
      document.getElementById('walletDisplay').innerHTML = `🦊 ${walletAddress.slice(0,6)}...${walletAddress.slice(-4)}`;
      
      // Initialisation du client GenLayer
      genLayerClient = createClient({
        chain: studionet,
        account: walletAddress
      });
      await genLayerClient.initializeConsensusSmartContract(); // facultatif mais recommandé
      
      // Récupérer le score et reward on‑chain
      const chainScore = await fetchOnChainScore();
      const chainRew = await fetchOnChainReward();
      if (chainScore > 0) setMsg(`✅ Wallet connecté. Score on‑chain : ${chainScore}`);
      else setMsg("✅ Wallet prêt ! Appuie sur START");
      
      if (chainRew > 0) {
        reward = chainRew;
        localStorage.setItem('snakeReward', reward);
        updateUI();
      }
      updateLeaderboard();
    } catch(e) {
      setMsg("❌ Erreur de connexion wallet : " + e.message, true);
    }
  }

  // ---------- EVENT LISTENERS ----------
  document.getElementById('connectWalletBtn').addEventListener('click', connectWalletAndClient);
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('pauseBtn').addEventListener('click', pauseGame);
  document.getElementById('resetBtn').addEventListener('click', resetGame);
  document.getElementById('claimBtn').addEventListener('click', claimRewardOnChain);
  
  // clavier
  window.addEventListener('keydown', (e) => {
    const key = e.key;
    if (key === 'ArrowUp') setDirection(0,-1);
    else if (key === 'ArrowDown') setDirection(0,1);
    else if (key === 'ArrowLeft') setDirection(-1,0);
    else if (key === 'ArrowRight') setDirection(1,0);
    else if (key === ' ' || key === 'Space') { e.preventDefault(); if (!running) startGame(); else pauseGame(); }
  });
  
  // D‑pad mobile
  document.querySelectorAll('.dpad button').forEach(btn => {
    btn.addEventListener('click', () => {
      const dx = parseInt(btn.getAttribute('data-dx'));
      const dy = parseInt(btn.getAttribute('data-dy'));
      if (!isNaN(dx) && !isNaN(dy)) setDirection(dx, dy);
    });
  });

  // initialisation silencieuse
  initGame();
  drawCanvas();
  renderLeaderboard();
  setMsg("🔗 Connecte ton wallet pour jouer et gagner des GEN on‑chain");
</script>
</body>
</html>

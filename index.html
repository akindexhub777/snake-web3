<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Web3 PRO 🐍</title>
  <script type="importmap">
  {
    "imports": {
      "genlayer-js": "https://esm.sh/genlayer-js@latest",
      "genlayer-js/chains": "https://esm.sh/genlayer-js@latest/chains"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    h1 { color: #a78bfa; font-size: 28px; margin-bottom: 4px; }
   .subtitle { color: #555; font-size: 12px; margin-bottom: 20px; }
   .wallet-box { background: #111128; border: 1px solid #2d2d4e; border-radius: 10px; padding: 12px 20px; margin-bottom: 16px; text-align: center; width: 100%; max-width: 420px; }
    #walletAddr { font-size: 11px; color: #7c3aed; word-break: break-all; margin-top: 4px; }
   .stats { display: flex; gap: 12px; margin-bottom: 12px; }
   .stat { background: #111128; border: 1px solid #2d2d4e; border-radius: 8px; padding: 10px 16px; text-align: center; min-width: 120px; }
   .stat-label { font-size: 11px; color: #666; }
   .stat-val { font-size: 20px; font-weight: bold; color: #a78bfa; }
    canvas { border: 2px solid #2d2d4e; border-radius: 10px; display: block; background: #0d0d1a; }
   .controls { display: flex; gap: 8px; margin: 12px 0; }
    button { padding: 10px 18px; border-radius: 8px; border: 1px solid #2d2d4e; background: #111128; color: #e0e0e0; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; }
    button:hover { background: #1e1e3f; border-color: #7c3aed; }
    button.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    #msg { font-size: 12px; color: #f59e0b; min-height: 18px; margin: 6px 0; }
  </style>
</head>
<body>

<h1>🐍 Snake Web3 PRO</h1>
<p class="subtitle">Powered by GenLayer Studionet</p>

<div class="wallet-box">
  <div id="walletAddr">Non connecté</div>
  <button class="primary" id="connectBtn" style="margin-top:8px;width:100%">🔗 Connecter MetaMask</button>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Score Session</div>
    <div class="stat-val" id="dispScore">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Score Blockchain</div>
    <div class="stat-val" id="chainScore">0</div>
  </div>
</div>

<div id="msg">Connecte ton wallet puis appuie sur Start</div>
<canvas id="game" width="400" height="400"></canvas>

<div class="controls">
  <button id="startBtn">▶ Start Game</button>
  <button id="saveBtn">💾 Sauvegarder Score On-Chain</button>
</div>

<script type="module">
  import { createClient } from 'genlayer-js';
  import { studionet } from 'genlayer-js/chains';

  // 1. CONFIGURATION DU CLIENT GENLAYER [1, 2]
  const CONTRACT_ADDR = "0x8ca6C94dC761ca504fF4037a8412CC623a9Ebd76";
  const client = createClient({ 
    chain: studionet, 
    endpoint: "https://studio.genlayer.com/api/rpc" 
  });

  let account = null;
  let score = 0;
  let gameRunning = false;

  // 2. CONNEXION WALLET 
  document.getElementById('connectBtn').onclick = async () => {
    if (typeof window.ethereum === 'undefined') return alert("Installe MetaMask!");
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      account = accounts;
      document.getElementById('walletAddr').innerText = account.substring(0,6) + "..." + account.substring(38) + " ✓";
      document.getElementById('msg').innerText = "Wallet connecté! Bonne chance.";
      syncBlockchainScore();
    } catch (e) { console.error(e); }
  };

  // 3. LECTURE DU SCORE (VIEW) [3, 4]
  async function syncBlockchainScore() {
    if (!account) return;
    try {
      const result = await client.readContract({
        address: CONTRACT_ADDR,
        functionName: "get_score",
        args: [account]
      });
      document.getElementById('chainScore').innerText = result;
    } catch (e) { console.error("Erreur lecture score", e); }
  }

  // 4. SAUVEGARDE DU SCORE (WRITE) [5, 3]
  document.getElementById('saveBtn').onclick = async () => {
    if (!account) return alert("Connecte ton wallet d'abord!");
    document.getElementById('msg').innerText = "⏳ Enregistrement on-chain en cours...";
    try {
      const tx = await client.writeContract({
        address: CONTRACT_ADDR,
        functionName: "eat_food", 
        args:,
        account: account
      });
      await client.waitForTransactionReceipt({ hash: tx }); // Attente du consensus [6]
      document.getElementById('msg').innerText = "✅ Score validé sur GenLayer!";
      syncBlockchainScore();
    } catch (e) { 
      document.getElementById('msg').innerText = "❌ Erreur transaction.";
      console.error(e);
    }
  };

  // 5. LOGIQUE DU JEU SNAKE
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let snake, dir, food;

  function initGame() {
    snake = [{x:10, y:10}, {x:9, y:10}, {x:8, y:10}];
    dir = {x:1, y:0};
    score = 0;
    document.getElementById('dispScore').innerText = "0";
    spawnFood();
  }

  function spawnFood() {
    food = {x: Math.floor(Math.random()*20), y: Math.floor(Math.random()*20)};
  }

  document.getElementById('startBtn').onclick = () => {
    if (!account) return alert("Connecte ton wallet!");
    initGame();
    gameRunning = true;
    document.getElementById('msg').innerText = "Jeu en cours...";
  };

  window.addEventListener('keydown', e => {
    if(e.key === 'ArrowUp' && dir.y === 0) dir = {x:0, y:-1};
    if(e.key === 'ArrowDown' && dir.y === 0) dir = {x:0, y:1};
    if(e.key === 'ArrowLeft' && dir.x === 0) dir = {x:-1, y:0};
    if(e.key === 'ArrowRight' && dir.x === 0) dir = {x:1, y:0};
  });

  function tick() {
    if (!gameRunning) return;
    const head = {x: snake.x + dir.x, y: snake.y + dir.y};
    
    if (head.x < 0 |

| head.x >= 20 |
| head.y < 0 |
| head.y >= 20 |
| snake.some(s => s.x === head.x && s.y === head.y)) {
      gameRunning = false;
      document.getElementById('msg').innerText = "💀 Game Over! Sauvegarde ton score.";
      return;
    }
    
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      document.getElementById('dispScore').innerText = score;
      spawnFood();
    } else { snake.pop(); }

    // Dessin
    ctx.fillStyle = '#0d0d1a'; ctx.fillRect(0,0,400,400);
    ctx.fillStyle = '#f59e0b'; ctx.fillRect(food.x*20+2, food.y*20+2, 16, 16);
    ctx.fillStyle = '#a78bfa'; snake.forEach(s => ctx.fillRect(s.x*20+1, s.y*20+1, 18, 18));
  }
  setInterval(tick, 130);
</script>
</body>
</html>
